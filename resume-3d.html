  <script>
    const THREE = window.THREE;

    // Verlet Integration Particle System
    class VerletParticle {
      constructor(x, y, z) {
        this.pos = new THREE.Vector3(x, y, z);
        this.prevPos = new THREE.Vector3(x, y, z);
        this.initialPos = new THREE.Vector3(x, y, z); // Store initial position
        this.acc = new THREE.Vector3(0, 0, 0);
        this.mass = 1;
        this.pinned = false;
      }
      
      update(dt) {
        if (this.pinned) {
          this.prevPos.copy(this.pos);
          return;
        }
        const vel = new THREE.Vector3().subVectors(this.pos, this.prevPos);
        this.prevPos.copy(this.pos);
        this.pos.add(vel);
        this.pos.add(this.acc.clone().multiplyScalar(dt * dt));
        this.acc.set(0, 0, 0);
      }
      
      addForce(force) {
        this.acc.add(force.clone().divideScalar(this.mass));
      }
    }

    class VerletConstraint {
      constructor(p1, p2, restLength) {
        this.p1 = p1;
        this.p2 = p2;
        this.restLength = restLength || p1.pos.distanceTo(p2.pos);
      }
      
      solve() {
        const delta = new THREE.Vector3().subVectors(this.p2.pos, this.p1.pos);
        const distance = delta.length();
        const diff = (distance - this.restLength) / distance;
        const correction = delta.multiplyScalar(diff * 0.15); // Further reduced to 0.15 to minimize stickiness
        
        if (!this.p1.pinned) {
          this.p1.pos.add(correction);
        }
        if (!this.p2.pinned) {
          this.p2.pos.sub(correction);
        }
      }
    }

    // Receipt Paper Simulation
    class ReceiptPaper {
      constructor(width = 4, height = 6, segmentsX = 20, segmentsY = 30) {
        this.width = width;
        this.height = height;
        this.segmentsX = segmentsX;
        this.segmentsY = segmentsY;
        this.particles = [];
        this.constraints = [];
        this.selectedParticle = null;
        this.mousePos = new THREE.Vector3();
        this.isDragging = false;
        this.resetTimer = null; // Timer for auto-reset after release
        this.isResetting = false; // Flag to indicate reset in progress
        this.releaseTime = null; // Time when mouse was released
        
        this.initParticles();
        this.initConstraints();
      }
      
      initParticles() {
        const stepX = this.width / this.segmentsX;
        const stepY = this.height / this.segmentsY;
        
        for (let y = 0; y <= this.segmentsY; y++) {
          for (let x = 0; x <= this.segmentsX; x++) {
            const px = (x / this.segmentsX - 0.5) * this.width;
            const py = -y * stepY;
            const pz = 0;
            
            const particle = new VerletParticle(px, py, pz);
            
            // Pin entire top row
            if (y === 0) {
              particle.pinned = true;
            }
            
            this.particles.push(particle);
          }
        }
      }
      
      initConstraints() {
        const cols = this.segmentsX + 1;
        
        for (let y = 0; y <= this.segmentsY; y++) {
          for (let x = 0; x <= this.segmentsX; x++) {
            const idx = y * cols + x;
            
            // Horizontal constraints
            if (x < this.segmentsX) {
              this.constraints.push(new VerletConstraint(
                this.particles[idx],
                this.particles[idx + 1]
              ));
            }
            
            // Vertical constraints
            if (y < this.segmentsY) {
              this.constraints.push(new VerletConstraint(
                this.particles[idx],
                this.particles[idx + cols]
              ));
            }
            
            // Diagonal constraints for stability
            if (x < this.segmentsX && y < this.segmentsY) {
              this.constraints.push(new VerletConstraint(
                this.particles[idx],
                this.particles[idx + cols + 1],
                this.particles[idx].pos.distanceTo(this.particles[idx + cols + 1].pos) * 0.98
              ));
              this.constraints.push(new VerletConstraint(
                this.particles[idx + 1],
                this.particles[idx + cols],
                this.particles[idx + 1].pos.distanceTo(this.particles[idx + cols].pos) * 0.98
              ));
            }
          }
        }
      }
      
      update(dt, gravity = -9.8, restoreForce = 0) {
        // Apply gravity (much stronger when not dragging for faster fall)
        const gravityMultiplier = this.isDragging ? 0.1 : 0.8;
        this.particles.forEach(p => {
          if (!p.pinned) {
            p.addForce(new THREE.Vector3(0, gravity * gravityMultiplier, 0));
            
            // Restore force to initial position (very strong when not dragging)
            if (restoreForce > 0) {
              const restore = new THREE.Vector3().subVectors(p.initialPos, p.pos);
              restore.multiplyScalar(restoreForce);
              p.addForce(restore);
            }
          }
        });
        
        // Update particles
        this.particles.forEach(p => p.update(dt));
        
        // Solve constraints (skip during reset to prevent sticking)
        if (!this.isResetting) {
          // Only 1 iteration and weaker constraint to minimize stickiness
          for (let i = 0; i < 1; i++) {
            this.constraints.forEach(c => c.solve());
          }
        }
        
        // Damping (much stronger when not dragging for faster recovery)
        const damping = this.isDragging ? 0.98 : 0.85; // Reduced from 0.92 to 0.85
        this.particles.forEach(p => {
          if (!p.pinned) {
            const vel = new THREE.Vector3().subVectors(p.pos, p.prevPos);
            p.prevPos.copy(p.pos.clone().sub(vel.multiplyScalar(damping)));
          }
        });
      }
      
      getClosestParticle(worldPos, maxDist = 0.5) {
        let closest = null;
        let minDist = maxDist;
        
        this.particles.forEach(p => {
          const dist = p.pos.distanceTo(worldPos);
          if (dist < minDist) {
            minDist = dist;
            closest = p;
          }
        });
        
        return closest;
      }
      
      resetToInitial() {
        // Force all particles back to their initial positions instantly
        this.isResetting = true;
        this.particles.forEach(p => {
          if (!p.pinned) {
            p.pos.copy(p.initialPos);
            p.prevPos.copy(p.initialPos);
            p.acc.set(0, 0, 0);
          }
        });
        // Re-enable constraints after reset
        setTimeout(() => {
          this.isResetting = false;
        }, 100);
      }
    }

    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f7fa);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 7); // Parallel to resume, closer view
    camera.lookAt(0, 0, 0); // Look directly at center of receipt
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);
    
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-5, 5, -5);
    scene.add(fillLight);
    
    // Receipt Paper (wider and larger for better readability)
    const receipt = new ReceiptPaper(9, 9, 30, 45);
    
    // Create geometry from particles
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(receipt.particles.length * 3);
    const normals = new Float32Array(receipt.particles.length * 3);
    const uvs = new Float32Array(receipt.particles.length * 2);
    
    const cols = receipt.segmentsX + 1;
    const rows = receipt.segmentsY + 1;
    
    // Initialize positions and UVs
    receipt.particles.forEach((p, i) => {
      positions[i * 3] = p.pos.x;
      positions[i * 3 + 1] = p.pos.y;
      positions[i * 3 + 2] = p.pos.z;
      
      const x = Math.floor(i % cols);
      const y = Math.floor(i / cols);
      uvs[i * 2] = x / receipt.segmentsX;
      uvs[i * 2 + 1] = y / receipt.segmentsY;
    });
    
    // Create indices for mesh
    const indices = [];
    for (let y = 0; y < receipt.segmentsY; y++) {
      for (let x = 0; x < receipt.segmentsX; x++) {
        const a = y * cols + x;
        const b = y * cols + x + 1;
        const c = (y + 1) * cols + x;
        const d = (y + 1) * cols + x + 1;
        
        indices.push(a, b, c);
        indices.push(b, d, c);
      }
    }
    
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geometry.setIndex(indices);
    geometry.computeVertexNormals();
    
    // Create canvas for receipt text (higher resolution for clarity)
    const canvas = document.createElement('canvas');
    canvas.width = 2048; // Doubled for better text clarity
    canvas.height = 2400; // Increased for full resume
    const ctx = canvas.getContext('2d');
    
    // Draw receipt content

    // Scale factor for higher resolution (2x)
    const scale = 2;

    ctx.font = 'bold 56px monospace';

    yPos += 35;

    yPos += 35;

    // Projects
    ctx.font = 'bold 36px monospace';

    ctx.font = '28px monospace';
    ctx.fillText('Java, Interfaces | May 2025', 40, yPos);
    yPos += 40;
    ctx.fillText('• Color algorithms, optimization', 40, yPos);
    yPos += 55;
    
    // Activities
    ctx.font = 'bold 36px monospace';
    ctx.fillText('ACTIVITIES', 40, yPos);
    yPos += 50;
    ctx.font = '28px monospace';
    ctx.fillText('• TikTok: 47K+ followers, 1.1M+ likes', 40, yPos);
    yPos += 40;
    ctx.fillText('• Judge, Boston Debate League', 40, yPos);
    yPos += 55;
    
    ctx.fillText('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 40, yPos);
    yPos += 45;
    ctx.font = 'bold 32px monospace';
    ctx.fillText('Availability: Jan - Aug 2026', 40, yPos);
    
    // Create texture from canvas
    const texture = new THREE.CanvasTexture(canvas);
    texture.flipY = false;
    texture.needsUpdate = true;
    
    // Material (thermal paper look)
    const material = new THREE.MeshStandardMaterial({
      map: texture,
      color: 0xffffff,
      roughness: 0.7,
      metalness: 0.1,
      side: THREE.DoubleSide,
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    
    // Ground plane for shadow
    const groundGeometry = new THREE.PlaneGeometry(20, 20);
    const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.2 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -4;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Mouse interaction
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(mesh);
      
      if (intersects.length > 0 && receipt.isDragging && receipt.selectedParticle) {
        const worldPos = intersects[0].point;
        const localPos = mesh.worldToLocal(worldPos.clone());
        receipt.selectedParticle.pos.copy(localPos);
      }
    }
    
    function onMouseDown(event) {
      if (event.button !== 0) return;
      
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(mesh);
      
      if (intersects.length > 0) {
        const worldPos = intersects[0].point;
        const localPos = mesh.worldToLocal(worldPos.clone());
        receipt.selectedParticle = receipt.getClosestParticle(localPos, 0.3);
        
        if (receipt.selectedParticle && !receipt.selectedParticle.pinned) {
          // Clear any pending reset timer when starting new drag
          if (receipt.resetTimer) {
            clearTimeout(receipt.resetTimer);
            receipt.resetTimer = null;
            receipt.releaseTime = null;
          }
          receipt.isDragging = true;
          receipt.selectedParticle.pinned = true;
          document.body.classList.add('dragging');
        }
      }
    }
    
    function onMouseUp() {
      if (receipt.selectedParticle) {
        receipt.selectedParticle.pinned = false;
        // Reset velocity to zero for immediate recovery
        receipt.selectedParticle.prevPos.copy(receipt.selectedParticle.pos);
        receipt.selectedParticle = null;
      }
      receipt.isDragging = false;
      document.body.classList.remove('dragging');
      
      // Record release time
      receipt.releaseTime = Date.now();
      
      // Clear any existing reset timer
      if (receipt.resetTimer) {
        clearTimeout(receipt.resetTimer);
      }
      
      // Set timer to reset to initial state after 2 seconds
      receipt.resetTimer = setTimeout(() => {
        receipt.resetToInitial();
        receipt.resetTimer = null;
        receipt.releaseTime = null;
      }, 2000);
    }
    
    // Toggle between PDF and 3D paper view
    const pdfViewer = document.getElementById('pdf-viewer');
    const paperToggle = document.getElementById('paper-toggle');
    const closePaper = document.getElementById('close-paper');
    const canvasContainer = document.getElementById('canvas-container');
    
    // Show 3D paper view (hide PDF)
    paperToggle.addEventListener('click', () => {
      pdfViewer.classList.add('hidden');
      canvasContainer.classList.add('active');
    });
    
    // Close 3D view (show PDF)
    closePaper.addEventListener('click', () => {
      pdfViewer.classList.remove('hidden');
      canvasContainer.classList.remove('active');
    });
    
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mouseup', onMouseUp);
    
    // Animation loop
    let lastTime = performance.now();
    
    function animate() {
      requestAnimationFrame(animate);
      
      const now = performance.now();
      const dt = Math.min((now - lastTime) / 1000, 0.02);
      lastTime = now;
      
      // Update physics (with restore force when not dragging, stronger before reset)
      const timeSinceRelease = receipt.releaseTime ? (Date.now() - receipt.releaseTime) : 10000;
      const restoreForce = receipt.isDragging ? 0 : (timeSinceRelease < 2000 ? 30.0 : 20.0); // Even stronger restore before reset (2 seconds)
      receipt.update(dt, -9.8, restoreForce);
      
      // Update geometry
      receipt.particles.forEach((p, i) => {
        positions[i * 3] = p.pos.x;
        positions[i * 3 + 1] = p.pos.y;
        positions[i * 3 + 2] = p.pos.z;
      });
      
      geometry.attributes.position.needsUpdate = true;
      geometry.computeVertexNormals();
      
      renderer.render(scene, camera);
    }
    
    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    animate();
  </script>
</body>
</html>
